<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <label>Upload a CSV:</label>
    <input type="file" id="csvInput" accept=".csv" />
    <input type="button" value="Show CSV" onclick="display_csv()" />

    <br><br>

    <label>Enter API URL:</label>
    <input type="url" id="apiInput" placeholder="https://example.com" size="40" required />
    <input type="button" value="Show API" onclick="display_api()" />

    <pre id="output"></pre>

    <div id="variableOpts">
        <label>Select variables</label>
    </div>

    <script>
        // variables for the contents
        let csv_content = "";
        let api_content = "";

        // Read file when CSV is selected
        document.getElementById("csvInput").addEventListener('change', function(event) {

            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function(e) {
                csv_content = e.target.result;  // save data
                select_var();
            };

            reader.readAsText(file);
        });

        // select ind & dep variables
        function select_var()
        {
            const lines = csv_content.split(/\r?\n/);
            const headers = lines[0].split(',');   // get the first row (column names)
            console.log(headers);  /////////////////////////////////////////////////////////////////////////////
            const variables = document.getElementById("variableOpts");
            variables.innerHTML = ""; 

            // button for each 
            headers.forEach(header => {
                const btn = document.createElement("button");
                btn.textContent = header;  
                btn.addEventListener("click", function() {
                    alert("You clicked column: " + header);
                });

                variables.appendChild(btn);  
            });
        }

        // Display CSV
        function display_csv() {
            if (!csv_content) {
                alert("No CSV loaded yet.");
                return;
            }
            // split into lines
            const lines = csv_content.split(/\r?\n/);
            let html = '<table border="1">';

            // Header
            const headers = lines[0].split(',');
            html += '<thead><tr>';
            headers.forEach(header => {
                html += `<th>${header}</th>`;
            });
            html += '</tr></thead>';

            // Body
            html += '<tbody>';
            for (let i = 1; i < lines.length; i++) {
                const cells = lines[i].split(',');
                if (cells.length === headers.length) { // Ensure consistent row structure
                    html += '<tr>';
                    cells.forEach(cell => {
                        html += `<td>${cell}</td>`;
                    });
                    html += '</tr>';
                }
            }
            html += '</tbody>';
            html += '</table>';
            document.getElementById('output').innerHTML = html;
        }


        // Fetch and Display API
        async function display_api() {

            const url = document.getElementById("apiInput").value;

            if (!url) {
                alert("Please enter an API URL.");
                return;
            }

            try {
                const response = await fetch(url);
                const data = await response.json();

                api_content = data;

                document.getElementById('output').innerText =
                    JSON.stringify(api_content, null, 2);

            } catch (error) {
                console.error("Error:", error);
                alert("Failed to fetch API.");
            }
        }

    </script>

</body>
</html>
